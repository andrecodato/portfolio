<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- connections -->
  <g stroke="#4ade80" stroke-width="1.4" stroke-linecap="round" opacity="0.9" filter="url(#glow)">
    <line x1="10" y1="46" x2="30" y2="12"/>
    <line x1="30" y1="12" x2="52" y2="46"/>
    <line x1="10" y1="46" x2="52" y2="46"/>

    <line x1="10" y1="46" x2="24" y2="26"/>
    <line x1="24" y1="26" x2="30" y2="12"/>
    <line x1="24" y1="26" x2="38" y2="28"/>
    <line x1="38" y1="28" x2="52" y2="46"/>
    <line x1="24" y1="26" x2="30" y2="40"/>
    <line x1="38" y1="28" x2="30" y2="40"/>
    <line x1="30" y1="40" x2="10" y2="46"/>
    <line x1="30" y1="40" x2="52" y2="46"/>

    <line x1="18" y1="46" x2="44" y2="46" opacity="0.65"/>
    <line x1="30" y1="12" x2="30" y2="40" opacity="0.55"/>
  </g>

  <!-- small particles -->
  <g fill="#86efac" opacity="0.85" filter="url(#glow)">
    <circle cx="20" cy="22" r="1.2"/>
    <circle cx="42" cy="20" r="1.1"/>
    <circle cx="17" cy="36" r="1"/>
    <circle cx="45" cy="37" r="1"/>
    <circle cx="36" cy="46" r="1"/>
  </g>

  <!-- main nodes -->
  <g fill="#4ade80" filter="url(#glow)">
    <circle cx="10" cy="46" r="3.4"/>
    <circle cx="30" cy="12" r="3.6"/>
    <circle cx="52" cy="46" r="4.2"/>
    <circle cx="24" cy="26" r="2.6"/>
    <circle cx="38" cy="28" r="3"/>
    <circle cx="30" cy="40" r="2.8"/>
  </g>
</svg>